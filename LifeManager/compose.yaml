services:
  lifemanager-db:
    image: postgres:15-alpine
    container_name: lifemanager_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lifemanager-net

  lifemanager-migration:
    image: ghcr.io/neyo03/dopami-adhd:latest
    container_name: lifemanager_migration
    entrypoint: ["./efbundle", "--connection", "Host=lifemanager-db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"]
    depends_on:
      lifemanager-db:
        condition: service_healthy
    networks:
      - lifemanager-net

  lifemanager-app:
    image: ghcr.io/neyo03/dopami-adhd:latest
    container_name: lifemanager_app
    environment:
      - ConnectionStrings__DefaultConnection=Host=lifemanager-db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    ports:
      - "8080:8080"
    depends_on:
      lifemanager-migration:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - lifemanager-net

networks:
  lifemanager-net:
    driver: bridge

volumes:
  pgdata:
