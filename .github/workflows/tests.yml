name: Tests

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore LifeManager.Tests/LifeManager.Tests.csproj

      - name: Build
        run: dotnet build LifeManager.Tests/LifeManager.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test LifeManager.Tests/LifeManager.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
